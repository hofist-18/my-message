<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Message For You</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #1e1e2f, #2c2c54, #1b1b3a, #2d2d5f);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      opacity: 0;
      transform: translateY(20px);
      transition: 1s ease;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      line-height: 1.6;
      font-size: 16px;
      margin: 10px 0;
      min-height: 20px;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    .start-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      background: white;
      color: black;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <!-- Background music (safe, won’t break page) -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_7b6f4b1f5a.mp3?filename=soft-piano-ambient-11455.mp3" type="audio/mpeg">
  </audio>

  <div class="card" id="card">

    <button class="start-btn" onclick="startMessage()">Tap to open</button>

    <h1>Hey...</h1>

    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <p id="p4"></p>
    <p id="p5"></p>

    <div class="footer">— From hofist the tech dev</div>

  </div>

  <script>
  const lines = [
    "I didn`t expect to hear from you again or you will ever call me again...",
    "I won’t lie, things haven’t been the same since you left. My nights are just crazy everyday.",
    "Hearing from you reminded me of our good vibes. And I am happy you called..",
    "I just hope you’re doing okay. Really.",
    "Say hi to vivi..I miss you",
  ];

  function typeText(element, text, speed = 60) {
    let i = 0;
    element.innerHTML = "";

    function typing() {
      if (i < text.length) {
        element.innerHTML += text[i];
        i++;
        setTimeout(typing, speed);
      }
    }

    typing();
  }

  function startMessage() {
    document.getElementById("card").classList.add("show");
    document.querySelector(".start-btn").style.display = "none";

    const audio = document.getElementById("bgMusic");
    audio.play().catch(() => {});

    // ⬇️ slower spacing between lines
    setTimeout(() => typeText(document.getElementById("p1"), lines[0]), 800);
    setTimeout(() => typeText(document.getElementById("p2"), lines[1]), 4000);
    setTimeout(() => typeText(document.getElementById("p3"), lines[2]), 7500);
    setTimeout(() => typeText(document.getElementById("p4"), lines[3]), 10500);
    setTimeout(() => typeText(document.getElementById("p5"), lines[4]), 13500);
  }
</script>

</body>
</html>
